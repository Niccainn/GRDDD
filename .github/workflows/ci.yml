name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./test.db
      GRID_ENCRYPTION_KEY: test-key-for-ci-only-32chars!!
      ANTHROPIC_API_KEY: sk-ant-test-placeholder
      GRID_CRON_TOKEN: test-cron-token
      GRID_WEBHOOK_TOKEN: test-webhook-token

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
